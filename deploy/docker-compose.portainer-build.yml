services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: 3cxmonitor
      POSTGRES_USER: 3cxmonitor
      POSTGRES_PASSWORD: change-this-db-password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U 3cxmonitor -d 3cxmonitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: https://github.com/GB-1972/3cx-monitor.git#main:backend
    image: 3cx-monitor-backend:local
    restart: unless-stopped
    environment:
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: change-this-password
      APP_SECRET_KEY: change-this-to-a-long-random-secret
      DATABASE_URL: postgresql+psycopg://3cxmonitor:change-this-db-password@postgres:5432/3cxmonitor
      POLL_INTERVAL_SECONDS: 30
      REQUEST_TIMEOUT_SECONDS: 12
      CORS_ORIGINS: http://localhost:8088
      SEED_INSTALLATION_ENABLED: "false"
      SEED_INSTALLATION_CUSTOMER_NAME: ADICOM
      SEED_INSTALLATION_BASE_URL: https://adicom.on3cx.de
      SEED_INSTALLATION_CLIENT_ID: monitoring
      SEED_INSTALLATION_CLIENT_SECRET: paste-3cx-api-secret-here
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: https://github.com/GB-1972/3cx-monitor.git#main:frontend
    image: 3cx-monitor-frontend:local
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8088:80"

volumes:
  postgres_data:
