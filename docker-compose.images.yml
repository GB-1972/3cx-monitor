services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-3cxmonitor}
      POSTGRES_USER: ${POSTGRES_USER:-3cxmonitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-db-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-3cxmonitor} -d ${POSTGRES_DB:-3cxmonitor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/gb-1972/3cx-monitor-backend:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8089:8000"

  frontend:
    image: ghcr.io/gb-1972/3cx-monitor-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8088:80"

volumes:
  postgres_data:

